services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
      # Переиспользуем уже скачанные на хост модели Ollama (не качаем заново).
      # Поправьте путь слева под свою папку OLLAMA_MODELS, либо удалите эту строку,
      # чтобы хранить модели в томе ./data/ollama (тогда нужен `ollama pull`).
      - D:/ollama/models:/root/.ollama/models
    restart: unless-stopped
    # Раскомментируйте для использования GPU (нужен NVIDIA Container Toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bureau
      POSTGRES_PASSWORD: bureau
      POSTGRES_DB: bureau
    ports:
      # Публикуем на 5433, чтобы не конфликтовать с локально установленным
      # PostgreSQL на 5432 (внутри сети compose контейнеры ходят по postgres:5432).
      - "5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # внутри сети compose Ollama и Postgres доступны по имени сервиса
      OLLAMA_BASE_URL: http://ollama:11434
      DATABASE_URL: postgresql+asyncpg://bureau:bureau@postgres:5432/bureau
    volumes:
      - ./data/chroma:/app/chroma_data
      - ./data/uploads:/app/uploads
    depends_on:
      - ollama
      - postgres
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

# ── Первый запуск ──────────────────────────────────────────
# 0) cp .env.example .env   (выставьте LLM_MODEL под VRAM, напр. qwen3:14b)
# 1) docker compose up -d ollama postgres
# 2) docker compose exec ollama ollama pull qwen3:14b    (или иную версию под VRAM)
# 3) docker compose up --build
#    → frontend http://localhost:3000, backend http://localhost:8000
#
# OCR скан-PDF работает «из коробки»: Tesseract(+рус) ставится в образ backend.
# Компас-3D НЕ контейнеризуется (Windows/COM): kompas-connector запускается
# отдельно на Windows с Компасом, адрес — в KOMPAS_CONNECTOR_URL.
#
# Для разработки без Docker:
#   Ollama:   ollama serve   и   ollama pull qwen3:14b
#   Postgres: поднять локально и указать DATABASE_URL в .env
#   Backend:  cd backend && uvicorn main:app --reload --port 8000
#   Frontend: cd frontend && npm run dev
